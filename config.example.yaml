# LOL Coach Configuration
# Copy this file to config.yaml and fill in your API keys.

ai:
  # Active provider: claude | openai | gemini
  provider: claude
  # Seconds between AI analysis requests. Defaults to capture.interval if not set.
  # Set higher than capture.interval to refresh screenshots more often than AI calls.
  interval: 3

  system_prompt: "你是一个英雄联盟教练，根据当前游戏截图，用简短的中文（不超过50字）给出最重要的一条对局建议。"

  claude:
    api_key: "your-anthropic-api-key-here"
    model: "claude-opus-4-6"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  openai:
    api_key: "your-openai-api-key-here"
    model: "gpt-4o"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  gemini:
    api_key: "your-google-api-key-here"
    model: "gemini-2.0-flash"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  deepseek:
    api_key: "your-deepseek-api-key-here"
    model: "deepseek-chat"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: false   # DeepSeek 不支持视觉
    # base_url: "https://api.deepseek.com"  # optional override

  qwen:
    api_key: "your-dashscope-api-key-here"
    model: "qwen-vl-plus"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # optional override

  zhipu:
    api_key: "your-zhipu-api-key-here"
    model: "glm-4v"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "https://open.bigmodel.cn/api/paas/v4/"  # optional override

  ollama:
    api_key: "ollama"
    model: "minicpm-v"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "http://localhost:11434/v1"  # optional override

  # Vision bridge: use a vision model to describe the screenshot,
  # then pass the description as text to the main provider.
  # Useful for text-only models like DeepSeek that don't support images.
  vision_bridge:
    enabled: false
    provider: ollama   # which provider to call for image→text (must support vision)
    prompt: "请简洁描述这张英雄联盟游戏截图中的关键战局信息，包括小地图态势、英雄血量、技能CD等。"

tts:
  # Active backend: windows | edge | openai
  backend: edge

  # Interrupt current speech when new advice arrives
  interrupt: true

  windows:
    rate: 180       # Words per minute
    volume: 1.0

  edge:
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+30%"    # 语速：+50% 快很多，+0% 正常，-20% 慢一些

  openai:
    api_key: "your-openai-api-key-here"
    voice: "alloy"
    model: "tts-1"

capture:
  # Interval in seconds for automatic capture. 0 = disabled.
  interval: 5
  # Global hotkey for manual capture. Empty string = disabled.
  hotkey: "ctrl+shift+a"
  # Screenshot region: fullscreen | lol_window
  region: "fullscreen"
  # JPEG compression quality (1-95)
  jpeg_quality: 85
  # Send screenshot to AI (true) or use game API data only (false, saves bandwidth/tokens)
  use_screenshot: true
  # Monitor index: 1 = primary, 2 = second monitor, 3 = third, ...
  monitor: 1

overlay:
  enabled: true
  x: 100
  y: 100
  # Seconds to display advice before fading. 0 = stay forever.
  fade_after: 8
  # Hotkey to toggle overlay visibility
  toggle_hotkey: "ctrl+shift+h"

app:
  start_minimized: true

lol_client:
  # Detail level for game data sent to AI:
  #   minimal — time, champion, level, HP, gold
  #   normal  — + mana, items, recent events (default)
  #   full    — + KDA, CS, wards, summoner spells, keystone rune, all allies/enemies
  detail: full
  # How to address the player in AI responses:
  #   champion  — use champion name, e.g. "Jinx" (default)
  #   summoner  — use summoner name, e.g. "PlayerName"
  #   none      — no address
  address_by: champion
  # Only send AI analysis when an active game is detected (default: true)
  # Set to false to analyze screenshots even outside of a game
  require_game: true
