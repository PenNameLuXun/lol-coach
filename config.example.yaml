# LOL Coach Configuration
# Copy this file to config.yaml and fill in your API keys.

decision:
  # Mode: ai | rules | hybrid
  mode: hybrid
  plugins:
    # Empty means load all discovered plugins.
    enabled: []
  rules:
    # In hybrid mode, rules at or above this priority bypass AI immediately.
    hybrid_priority_threshold: 85

scheduler:
  # Main decision heartbeat in seconds.
  interval: 3

launcher:
  enabled: false
  poll_interval: 2
  cooldown_seconds: 60
  auto_start_overwolf: true
  auto_start_main: true
  auto_stop_main: false
  auto_stop_overwolf: false
  main_python: ".\\.venv\\Scripts\\python.exe"
  main_args:
    - "main.py"
  overwolf:
    # auto | path | protocol
    method: auto
    path: ""
    protocol: "overwolf://"
  watched_games:
    - id: league
      # LoL / TFT 当前共用同一套客户端进程，按需自行调整
      process_names:
        - "League of Legends.exe"
        - "LeagueClientUx.exe"
        - "LeagueClient.exe"

web_knowledge:
  enabled: true
  # duckduckgo | google
  search_engine: google
  refresh_interval_seconds: 300
  timeout_seconds: 8
  max_results_per_site: 1
  max_pages: 6
  # 单屏时是否默认常驻显示；关闭时可通过下面的热键按住临时显示
  always_visible: false
  # 如果没有副屏，则按住这个热键时显示 Web 资料窗口
  hotkey: "alt+`"
  window_width: 560
  window_height: 900
  # 每行一个站点，格式：domain,priority
  default_sites_text: |
    op.gg,100
    u.gg,95
    tactics.tools,100
    lolchess.gg,95

overwolf:
  # Enable when you want plugins such as TFT to consume data from a local Overwolf bridge.
  enabled: false
  host: 127.0.0.1
  port: 7799
  stale_after_seconds: 5

plugin_settings:
  lol:
    # minimal | normal | full
    detail: full
    # champion | summoner | none
    address_by: champion
    require_game: true
    system_prompt: "你是一个英雄联盟教练，根据当前游戏截图，用简短的中文（不超过50字）给出最重要的一条对局建议。"
    qa_search_sites_text: |
      op.gg,100
      u.gg,95
      leagueofgraphs.com,90
    knowledge_enabled: true
    knowledge_max_champions: 5
    knowledge_include_enemy_champions: false
    knowledge_search_sites_text: |
      op.gg,100
      u.gg,95
      leagueofgraphs.com,90
    trigger_force_after_seconds: 45
    trigger_hp_drop_pct: 20
    trigger_gold_delta: 350
    trigger_cs_delta: 8
    trigger_skip_stable_cycles: true
  tft:
    # riot_live_client | overwolf | hybrid
    # overwolf / hybrid require the global overwolf bridge above to be enabled.
    data_source: riot_live_client
    # minimal | normal | full
    detail: normal
    # champion | summoner | none
    address_by: summoner
    require_game: true
    system_prompt: "你是一个云顶之弈教练，根据当前游戏截图，用简短的中文（不超过50字）给出最重要的一条建议，例如该买什么英雄、阵容方向、经济决策等。"
    qa_search_sites_text: |
      lolchess.gg,100
      tactics.tools,95
      mobalytics.gg,90
    knowledge_enabled: true
    knowledge_search_sites_text: |
      tactics.tools,100
      lolchess.gg,95
      mobalytics.gg,90
  dialogue:
    # file | microphone
    source: file
    text_file: dialogue_input.txt
    transcript_file: dialogue_mic.txt
    recognition_language: zh-CN
    # powershell | qt
    # powershell: 直接拉起独立 PowerShell 监听脚本，当前最稳定
    # qt: 由主程序内的 Qt 路线托管系统 STT 进程，便于后续收敛到统一输入架构
    microphone_backend: powershell
    # system | whisper
    # system: 使用 Windows 系统语音识别
    # whisper: 预留给后续本地/模型识别实现
    stt_backend: system
    auto_start_listener: true
    # 预留给 Qt 麦克风架构的判句静音时长
    silence_ms: 1000
    max_transcript_mb: 10
    speaker: 玩家
    clear_after_read: false
    system_prompt: "你是测试助手，会根据用户刚才说的话给出一句自然、简短、适合语音播报的中文回复。"

qa:
  enabled: false
  # ai
  mode: ai
  # file | microphone
  source: file
  text_file: game_qa_input.txt
  transcript_file: game_qa_mic.txt
  recognition_language: zh-CN
  # powershell | qt
  # powershell: 直接拉起独立 PowerShell 监听脚本，当前最稳定
  # qt: 由主程序内的 Qt 路线托管系统 STT 进程，便于后续收敛到统一输入架构
  microphone_backend: powershell
  # system | whisper
  # system: 使用 Windows 系统语音识别
  # whisper: 预留给后续本地/模型识别实现
  stt_backend: system
  # always | hold
  # always: 始终监听
  # hold: 只有按住热键时才允许问答文本进入主流程
  microphone_trigger_mode: always
  # 当 microphone_trigger_mode=hold 时生效
  microphone_hotkey: "alt"
  auto_start_listener: true
  # 预留给 Qt 麦克风架构的判句静音时长
  silence_ms: 1000
  max_transcript_mb: 10
  # Enable web search before answering, then pass the collected site content to AI.
  web_search_enabled: false
  # auto | always | off
  # auto: 仅当问题看起来需要最新资料时才搜索
  # always: 每次回答前都先搜索
  # off: 即使启用了 web_search_enabled 也不实际搜索
  web_search_mode: auto
  # duckduckgo | google
  web_search_engine: duckduckgo
  web_search_timeout_seconds: 8
  web_search_max_results_per_site: 1
  web_search_max_pages: 3
  # 每行一个站点，格式：domain,priority
  web_search_sites_text: |
    leagueofgraphs.com,90
    mobafire.com,70
  speaker: 玩家
  system_prompt: "你是 MOBA 与策略游戏问答助手。用户会在对局中或对局外提出英雄对线、出装、运营、阵容理解等问题。请用简洁、可靠、可执行的中文直接回答，优先给出 2 到 4 个最关键建议；如果信息不够，就明确说明你的假设。"

ai:
  # Active provider: claude | openai | gemini | deepseek | qwen | zhipu | ollama
  provider: claude
  # Number of recent decision snapshots kept in memory for trend-aware coaching.
  decision_memory_size: 5

  claude:
    api_key: "your-anthropic-api-key-here"
    model: "claude-opus-4-6"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  openai:
    api_key: "your-openai-api-key-here"
    model: "gpt-4o"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  gemini:
    api_key: "your-google-api-key-here"
    model: "gemini-2.0-flash"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true

  deepseek:
    api_key: "your-deepseek-api-key-here"
    model: "deepseek-chat"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: false   # DeepSeek 不支持视觉
    # base_url: "https://api.deepseek.com"  # optional override

  qwen:
    api_key: "your-dashscope-api-key-here"
    model: "qwen-vl-plus"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # optional override

  zhipu:
    api_key: "your-zhipu-api-key-here"
    model: "glm-4v"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "https://open.bigmodel.cn/api/paas/v4/"  # optional override

  ollama:
    api_key: "ollama"
    model: "minicpm-v"
    max_tokens: 200
    temperature: 0.7
    use_screenshot: true
    # base_url: "http://localhost:11434/v1"  # optional override

  # Vision bridge: use a vision model to describe the screenshot,
  # then pass the description as text to the main provider.
  # This project now defaults to a bridge-first pipeline for higher-confidence decisions.
  vision_bridge:
    enabled: true
    provider: ollama   # which provider to call for image→text (must support vision)
    model: "qwen2.5vl:7b"   # optional override; defaults to ai.<provider>.model when omitted
    # Leave prompt empty to use the built-in structured bridge prompt.
    prompt: ""

tts:
  # Active backend: windows | edge | openai
  backend: edge

  # wait = 顺序播完再继续
  # interrupt = 若后端支持，用新语音打断当前播报
  # continue = 不等待也不打断，继续排队
  # fit_wait = 按分析心跳尽量调语速播完，播不完则等待
  # fit_continue = 按分析心跳尽量调语速播完，播不完也继续排队
  playback_mode: wait

  windows:
    rate: 6         # Windows SAPI 相对语速，建议范围 -10 到 10
    volume: 1.0

  edge:
    voice: "zh-CN-XiaoxiaoNeural"
    rate: "+30%"    # 语速：+50% 快很多，+0% 正常，-20% 慢一些

  openai:
    api_key: "your-openai-api-key-here"
    voice: "alloy"
    model: "tts-1"

capture:
  # Interval in seconds for automatic capture. 0 = disabled.
  interval: 5
  # Global hotkey for manual capture. Empty string = disabled.
  hotkey: "ctrl+shift+a"
  # Screenshot region: fullscreen | lol_window
  region: "fullscreen"
  # JPEG compression quality (1-95)
  jpeg_quality: 85
  # Send screenshot to AI (true) or use game API data only (false, saves bandwidth/tokens)
  use_screenshot: true
  # Monitor index: 1 = primary, 2 = second monitor, 3 = third, ...
  monitor: 1

overlay:
  enabled: true
  x: 100
  y: 100
  # Seconds to display advice before fading. 0 = stay forever.
  fade_after: 8
  # Hotkey to toggle overlay visibility
  toggle_hotkey: "ctrl+shift+h"

app:
  start_minimized: true
